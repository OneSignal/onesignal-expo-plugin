name: 'Setup Demo'
description: 'Builds the expo plugin, installs it into the demo via tarball, generates native folders, and writes the .env file'
inputs:
  onesignal-app-id:
    description: 'OneSignal App ID for the demo .env'
    required: true
  onesignal-api-key:
    description: 'OneSignal API Key for the demo .env'
    required: true
  prebuild-platform:
    description: 'Platform to run `expo prebuild` for: ios, android, or all'
    required: false
    default: 'all'
  install-pods:
    description: 'Whether to run pod install for iOS after prebuild'
    required: false
    default: 'false'
runs:
  using: 'composite'
  steps:
    - name: Set up Vite+
      uses: voidzero-dev/setup-vp@v1
      with:
        cache: true
        run-install: true

    - name: Cache demo dependencies
      uses: actions/cache@v5
      with:
        path: examples/demo/node_modules
        key: vp-${{ runner.os }}-${{ hashFiles('examples/demo/package-lock.json') }}
        restore-keys: vp-${{ runner.os }}-

    - name: Build plugin and install into demo
      shell: bash
      working-directory: examples/demo
      run: vp run setup

    - name: Create demo .env
      shell: bash
      working-directory: examples/demo
      run: |
        echo "EXPO_PUBLIC_ONESIGNAL_APP_ID=${{ inputs.onesignal-app-id }}" > .env
        echo "EXPO_PUBLIC_ONESIGNAL_API_KEY=${{ inputs.onesignal-api-key }}" >> .env
        echo "EXPO_PUBLIC_E2E_MODE=true" >> .env
        echo "EXPO_PUBLIC_ONESIGNAL_ANDROID_CHANNEL_ID=7ec2ece9-c538-4656-9516-1316f48a005c" >> .env

    - name: Expo prebuild
      shell: bash
      working-directory: examples/demo
      env:
        PREBUILD_PLATFORM: ${{ inputs.prebuild-platform }}
      run: |
        if [ "$PREBUILD_PLATFORM" = "all" ]; then
          vpx expo prebuild --clean --no-install
        else
          vpx expo prebuild --platform "$PREBUILD_PLATFORM" --clean --no-install
        fi

    - name: Cache CocoaPods
      if: inputs.install-pods == 'true'
      uses: actions/cache@v5
      with:
        path: |
          examples/demo/ios/Pods
          ~/Library/Caches/CocoaPods
          ~/.cocoapods/repos
        # Hash Podfile (exists after `expo prebuild --no-install`) rather than
        # Podfile.lock — the lockfile isn't generated until the Install Pods
        # step below, so hashing it would always resolve to the empty string
        # and degrade to the restore-key, defeating content-addressing.
        key: pods-${{ runner.os }}-${{ hashFiles('examples/demo/ios/Podfile') }}
        restore-keys: pods-${{ runner.os }}-

    - name: Install Pods
      if: inputs.install-pods == 'true'
      shell: bash
      working-directory: examples/demo/ios
      run: pod install
