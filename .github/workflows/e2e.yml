name: E2E Tests

on:
  push:
    branches:
      - rel/**
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to test'
        required: true
        default: 'both'
        type: choice
        options:
          - android
          - ios
          - both

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    if: >-
      github.event_name == 'push' ||
      github.event.inputs.platform == 'android' ||
      github.event.inputs.platform == 'both'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up demo
        uses: ./.github/actions/setup-demo
        with:
          onesignal-app-id: ${{ vars.APPIUM_ONESIGNAL_APP_ID }}
          onesignal-api-key: ${{ secrets.APPIUM_ONESIGNAL_API_KEY }}
          prebuild-platform: android

      - name: Build release APK
        working-directory: examples/demo/android
        run: ./gradlew assembleRelease --quiet --console=plain --warning-mode=summary

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: demo-apk
          path: examples/demo/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 1
          compression-level: 0

  build-ios:
    if: >-
      github.event_name == 'push' ||
      github.event.inputs.platform == 'ios' ||
      github.event.inputs.platform == 'both'
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up demo
        uses: ./.github/actions/setup-demo
        with:
          onesignal-app-id: ${{ vars.APPIUM_ONESIGNAL_APP_ID }}
          onesignal-api-key: ${{ secrets.APPIUM_ONESIGNAL_API_KEY }}
          prebuild-platform: ios
          install-pods: 'true'

      - name: Stage ExportOptions.plist for archive
        working-directory: examples/demo
        run: cp ExportOptions.plist ios/ExportOptions.plist

      # Patch the prebuilt pbxproj to use manual signing for Release on every
      # target (main app, NSE, Live Activity widget). Done here instead of via
      # an Expo config plugin to avoid mod-ordering issues — at this point the
      # NSE/Widget targets already exist in the pbxproj.
      - name: Pin Release signing for all iOS targets
        working-directory: examples/demo/ios
        env:
          DEV_TEAM: '99SW8E36CT'
        run: |
          /usr/bin/python3 - <<'PY'
          import os, re, pathlib

          dev_team = os.environ['DEV_TEAM']
          targets = {
              'OneSignalDemo': 'Appium Demo - Main',
              'OneSignalNotificationServiceExtension': 'Appium Demo - NSE',
              'OneSignalWidget': 'Appium Demo - Live Activity',
          }

          pbx = pathlib.Path('OneSignalDemo.xcodeproj/project.pbxproj')
          text = pbx.read_text()

          def patch(block: str) -> str:
              for tname, profile in targets.items():
                  if (
                      f'PRODUCT_NAME = "{tname}"' in block
                      or f'PRODUCT_NAME = {tname}' in block
                  ):
                      block = re.sub(r'\n\s*CODE_SIGN_STYLE = \w+;', '', block)
                      block = re.sub(r'\n\s*PROVISIONING_PROFILE_SPECIFIER = [^;]+;', '', block)
                      block = re.sub(r'\n\s*CODE_SIGN_IDENTITY = [^;]+;', '', block)
                      block = re.sub(r'\n\s*DEVELOPMENT_TEAM = [^;]+;', '', block)
                      inject = (
                          '\n\t\t\t\tCODE_SIGN_STYLE = Manual;'
                          f'\n\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = "{profile}";'
                          '\n\t\t\t\tCODE_SIGN_IDENTITY = "Apple Development";'
                          f'\n\t\t\t\tDEVELOPMENT_TEAM = {dev_team};'
                      )
                      block = block.replace('buildSettings = {', 'buildSettings = {' + inject, 1)
                      print(f'patched target={tname} profile={profile}')
                      break
              return block

          new_text = re.sub(
              r'(/\* Release \*/ = \{[\s\S]*?name = Release;\s*\};)',
              lambda m: patch(m.group(1)),
              text,
          )
          pbx.write_text(new_text)
          PY

      # DerivedData is mostly invalidated by Xcode/Pods/source changes, but a
      # warm partial cache lets Xcode skip a huge chunk of incremental work.
      # The restore-keys fallback is what makes this useful — the exact key
      # rarely matches across runs, so we deliberately rely on the prefix.
      - name: Cache Xcode DerivedData
        uses: actions/cache@v5
        with:
          path: examples/demo/ios/build
          key: deriveddata-${{ runner.os }}-${{ hashFiles('examples/demo/package.json', 'examples/demo/app.config.ts', 'examples/demo/ios/Podfile') }}
          restore-keys: |
            deriveddata-${{ runner.os }}-

      - name: Set up iOS codesigning
        uses: OneSignal/sdk-shared/.github/actions/setup-ios-demo-codesigning@main
        with:
          p12-base64: ${{ secrets.APPIUM_IOS_DEV_CERT_P12_BASE64 }}
          p12-password: ${{ secrets.APPIUM_IOS_DEV_CERT_PASSWORD }}
          asc-key-id: ${{ secrets.APPIUM_APP_STORE_CONNECT_KEY_ID }}
          asc-issuer-id: ${{ secrets.APPIUM_APP_STORE_CONNECT_ISSUER_ID }}
          asc-private-key: ${{ secrets.APPIUM_APP_STORE_CONNECT_PRIVATE_KEY }}

      - name: Build signed IPA
        working-directory: examples/demo/ios
        run: |
          xcodebuild archive \
            -workspace OneSignalDemo.xcworkspace \
            -scheme OneSignalDemo \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath build/OneSignalDemo.xcarchive \
            -derivedDataPath build \
            -quiet \
            -hideShellScriptEnvironment \
            CODE_SIGN_STYLE=Manual \
            COMPILER_INDEX_STORE_ENABLE=NO \
            DEBUG_INFORMATION_FORMAT=dwarf \
            STRIP_SWIFT_SYMBOLS=NO
          xcodebuild -exportArchive \
            -archivePath build/OneSignalDemo.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/ipa \
            -quiet

      - name: Verify aps-environment in IPA
        working-directory: examples/demo/ios
        run: |
          IPA=$(ls build/ipa/*.ipa | head -n1)
          unzip -oq "$IPA" -d /tmp/ipa
          APP=$(ls -d /tmp/ipa/Payload/*.app | head -n1)
          codesign -d --entitlements - "$APP" 2>&1 | tee /tmp/entitlements.txt
          if ! grep -q 'aps-environment' /tmp/entitlements.txt; then
            echo "::error::Built IPA is missing aps-environment entitlement; push subscription will not work"
            exit 1
          fi

      - name: Upload IPA
        uses: actions/upload-artifact@v7
        with:
          name: demo-ipa
          path: examples/demo/ios/build/ipa/OneSignalDemo.ipa
          retention-days: 1
          compression-level: 0

  e2e-android:
    needs: build-android
    uses: OneSignal/sdk-shared/.github/workflows/appium-e2e.yml@main
    secrets: inherit
    with:
      platform: android
      app-artifact: demo-apk
      app-filename: app-release.apk
      sdk-type: react-native
      build-name: expo-android-${{ github.ref_name }}-${{ github.run_number }}

  e2e-ios:
    needs: build-ios
    uses: OneSignal/sdk-shared/.github/workflows/appium-e2e.yml@main
    secrets: inherit
    with:
      platform: ios
      app-artifact: demo-ipa
      app-filename: OneSignalDemo.ipa
      sdk-type: react-native
      build-name: expo-ios-${{ github.ref_name }}-${{ github.run_number }}
